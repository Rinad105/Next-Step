<html>
<head>
<title>Log In - NextStep</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="site-header">
  <a href="index.html">
    <img src="logo.png" alt="NextStep Logo" class="logo">
  </a>
  <h1>NextStep</h1>
</header>

<section class="form-section">
  <h2>Log In</h2>

  <form id="loginForm">
    <input type="email" id="loginEmail" placeholder="Email Address" required>
    <input type="password" id="loginPassword" placeholder="Password" required>
    <button type="submit" class="btn">Log In</button>
  </form>

  <a href="#" class="back-link" id="forgotPassword">Forgot Password?</a>
  <a href="index.html" class="back-link">Back</a>
</section>

<script>
const loginForm = document.getElementById("loginForm");
const forgotPassword = document.getElementById("forgotPassword");

loginForm.addEventListener("submit", function (e) {
  e.preventDefault();

  const users = JSON.parse(localStorage.getItem("users")) || [];
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value.trim();

  if (users.length === 0) {
    alert("No accounts found. Please sign up first.");
    return;
  }

  const userByEmail = users.find(u => u.email === email);

  if (!userByEmail) {
    alert("Email not found. Please sign up first.");
    return;
  }

  if (userByEmail.password !== password) {
    alert("Incorrect password.");
    return;
  }

  localStorage.setItem("currentUser", JSON.stringify(userByEmail));
  window.location.href = "dashboard.html";
});

forgotPassword.addEventListener("click", function () {
  const email = prompt("Enter your registered email:");
  if (!email) return;

  const users = JSON.parse(localStorage.getItem("users")) || [];
  const user = users.find(u => u.email === email.trim());

  if (!user) {
    alert("Email not found. Please sign up first.");
    return;
  }

  alert("Your password is: " + user.password);
});
</script>

</body>
</html>
