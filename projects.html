<html>
<head>
  <title>Projects — Rinad</title>
  <style>
    body {
      background: linear-gradient(135deg, #6d1b2f, #3b0a18);
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
    }

    nav {
      width: 100%;
      background-color: #4a0f1f;
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 15px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    nav a {
      color: #f5d7de;
      font-size: 18px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    h1 {
      font-family: 'Times New Roman', Times, serif;
      font-size: 38px;
      color: #f5d7de;
      margin: 30px 0 10px;
    }

    h2 {
      font-family: 'Times New Roman', Times, serif;
      font-size: 26px;
      color: #6d1b2f;
      margin-top: 30px;
    }

    .container {
      background-color: #ffe7eb;
      max-width: 900px;
      width: 90%;
      margin: 20px;
      padding: 30px 40px;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background-color: #fff0f3;
      border-left: 6px solid #6d1b2f;
      padding: 15px 20px;
      margin-bottom: 15px;
      border-radius: 12px;
      color: #3b0a18;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }

    input {
      width: 100%;
      max-width: 350px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #6d1b2f;
      background-color: #fae3e8;
      font-size: 15px;
      margin-bottom: 15px;
    }

    button {
      background-color: #6d1b2f;
      color: #fae3e8;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #4a0f1f;
    }
  </style>
</head>
<body>

<nav>
  <a href="profile-home.html">Home</a>
  <a href="projects.html">Projects</a>
</nav>

<h1>My Projects</h1>

<div class="container">

  <h2>Project List</h2>
  <ul id="projectList"></ul>

  <h2>Add New Project</h2>
  <input id="title" placeholder="Project Title">
  <input id="description" placeholder="Description">
  <input id="language" placeholder="Language">
  <input id="category" placeholder="Category">
  <button onclick="addProject()">Add Project</button>

</div>

<script>
  function loadProjects() {
    fetch("/api/projects")
      .then(response => response.json())
      .then(data => {
        const list = document.getElementById("projectList");
        list.innerHTML = "";
        data.forEach(project => {
          const li = document.createElement("li");
          li.innerHTML = `
            <b>${project.title}</b><br>
            ${project.description}<br>
            ${project.language} | ${project.category}
          `;
          list.appendChild(li);
        });
      });
  }

  function addProject() {
    const project = {
      title: document.getElementById("title").value,
      description: document.getElementById("description").value,
      language: document.getElementById("language").value,
      category: document.getElementById("category").value
    };

    fetch("/api/projects", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(project)
    })
    .then(res => res.json())
    .then(() => {
      loadProjects();
      document.getElementById("title").value = "";
      document.getElementById("description").value = "";
      document.getElementById("language").value = "";
      document.getElementById("category").value = "";
    });
  }

  loadProjects();
</script>

</body>
</html>
